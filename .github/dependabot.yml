version: 2
updates:
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 5
    versioning-strategy: increase-if-necessary
    groups:
      minor-and-patch:
        update-types:
          - minor
          - patch
    ignore:
      # Prisma majors precisam de migração planejada (driver adapter,
      # prisma.config.ts, seeding, enum mapping). Bumps minor/patch
      # continuam liberados via grupo acima.
      - dependency-name: prisma
        update-types:
          - version-update:semver-major
      - dependency-name: '@prisma/client'
        update-types:
          - version-update:semver-major
    commit-message:
      prefix: chore(deps)
      prefix-development: chore(deps-dev)

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 5
    groups:
      minor-and-patch:
        update-types:
          - minor
          - patch
    commit-message:
      prefix: chore(actions)
